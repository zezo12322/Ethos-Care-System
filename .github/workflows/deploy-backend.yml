name: Deploy Backend to Azure App Service

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'ethos-care-backend/**'
      - '.github/workflows/deploy-backend.yml'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ethos-care-backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: ethos-care-backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}

      - name: Run tests
        run: npm test

      - name: Build backend
        run: npm run build

      - name: Apply database migrations
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}

      - name: Verify build output
        run: |
          echo "Current directory:"
          pwd
          echo "Files:"
          ls -la
          echo "Dist files:"
          find dist -maxdepth 5 -type f | sort
          test -f dist/src/main.js
          
      - name: Prune dev dependencies
        run: npm prune --omit=dev

      - name: Create startup script
        run: |
          cat > startup.sh <<'EOF'
          #!/usr/bin/env bash
          set -e

          cd /home/site/wwwroot

          # تثبيت Chromium وخطوط عربية لتوليد ملفات PDF (طباعة الحالة).
          # App Service لينكس لا يحتوي على متصفح افتراضيًا؛ نثبّته عند الإقلاع.
          if [ ! -x /usr/bin/chromium ]; then
            echo "Installing Chromium + Arabic fonts for PDF generation..."
            export DEBIAN_FRONTEND=noninteractive
            apt-get update -y || true
            apt-get install -y --no-install-recommends chromium fonts-noto-core fonts-liberation || true
          fi

          if [ -x /usr/bin/chromium ]; then
            export CHROME_EXECUTABLE_PATH=/usr/bin/chromium
            echo "CHROME_EXECUTABLE_PATH=$CHROME_EXECUTABLE_PATH"
          else
            echo "WARN: chromium not available; PDF generation may fail."
          fi

          echo "Starting Ethos Care backend..."
          echo "Searching for main.js..."
          find . -maxdepth 5 -type f -name "main.js" -print || true

          if [ -f dist/src/main.js ]; then
            exec node dist/src/main.js
          fi

          if [ -f dist/main.js ]; then
            exec node dist/main.js
          fi

          echo "ERROR: Cannot find main.js"
          echo "Root files:"
          ls -la
          echo "Dist files:"
          find dist -maxdepth 5 -type f | sort || true
          exit 1
          EOF

          chmod +x startup.sh
          
      - name: Prepare deployment artifact
        run: |
          rm -rf release
          mkdir -p release
          cp -r dist prisma node_modules package.json package-lock.json startup.sh release/

      - name: Verify artifact contents
        run: |
          echo "Release files:"
          ls -la release
          echo "Release dist:"
          find release/dist -maxdepth 4 -type f | sort
          test -f release/dist/src/main.js
          
      - name: Zip artifact
        run: |
          cd release
          zip -r ../release.zip .

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: Lifemakers
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: ethos-care-backend/release.zip
